name: Deploy ZTF Registration to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          cat > .env.production << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_MAIN_SITE_URL=${{ secrets.NEXT_PUBLIC_MAIN_SITE_URL }}
          NODE_ENV=production
          EOF

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Hostinger to known hosts
        run: |
          mkdir -p ~/.ssh
          for i in 1 2 3 4 5; do
            ssh-keyscan -H -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ssh-keyscan failed after 5 attempts"
            exit 1
          fi
          echo "Known hosts updated successfully"
      - name: Restart app with PM2
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} bash -s << 'ENDSSH'
            cd ${{ secrets.DEPLOY_PATH }}
            cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
            cp -r public .next/standalone/public 2>/dev/null || true
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2
            pm2 stop ztf-registration 2>/dev/null || true
            pm2 delete ztf-registration 2>/dev/null || true
            pm2 start .next/standalone/server.js --name ztf-registration
            pm2 save
            touch tmp/restart.txt
            pm2 list
      - name: Deploy to server
        run: |
          tar -czf deploy.tar.gz \
            .next \
            package.json \
            package-lock.json \
            .env.production \
            ecosystem.config.js \
            next.config.js \
            server.js
          scp -P ${{ secrets.SSH_PORT }} deploy.tar.gz \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/deploy.tar.gz
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            source ~/.profile
            cd ${{ secrets.DEPLOY_PATH }}
            tar -xzf ~/deploy.tar.gz
            rm ~/deploy.tar.gz
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt
          ENDSSH